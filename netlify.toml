[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Proxy configuration to bypass Mixed Content (HTTPS -> HTTP) blocker
[[redirects]]
  from = "/api/*"
  to = "http://YOUR_BACKEND_IP_OR_DOMAIN:8001/api/:splat"
  status = 200
  force = true