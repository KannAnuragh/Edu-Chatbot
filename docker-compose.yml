name: ai-course-assistant

services:
  postgres:
    image: postgres:16-alpine
    container_name: aca-postgres
    restart: always
    environment:
      POSTGRES_USER: aca_user
      POSTGRES_PASSWORD: aca_secret
      POSTGRES_DB: aca_db
    ports:
      - "5433:5432"
    volumes:
      - aca_postgres_data:/var/lib/postgresql/data
    networks:
      - aca_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aca_user -d aca_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aca-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - aca_redis_data:/data
    networks:
      - aca_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aca-qdrant
    restart: always
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - aca_qdrant_data:/qdrant/storage
    networks:
      - aca_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aca-backend
    restart: always
    command: sh -c "python create_users.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aca_user:aca_secret@postgres:5432/aca_db
      - DATABASE_URL_SYNC=postgresql://aca_user:aca_secret@postgres:5432/aca_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - FRONTEND_URL=http://localhost:3001
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - aca_backend_uploads:/app/uploads
    networks:
      - aca_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aca-celery
    restart: always
    command: python -m celery -A workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aca_user:aca_secret@postgres:5432/aca_db
      - DATABASE_URL_SYNC=postgresql://aca_user:aca_secret@postgres:5432/aca_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - aca_backend_uploads:/app/uploads
    networks:
      - aca_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    container_name: aca-frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    depends_on:
      - backend
    networks:
      - aca_net

volumes:
  aca_postgres_data:
  aca_redis_data:
  aca_qdrant_data:
  aca_backend_uploads:

networks:
  aca_net:
    driver: bridge
