name: ai-course-assistant

services:
  postgres:
    image: postgres:16-alpine
    container_name: aca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aca_user
      POSTGRES_PASSWORD: aca_secret
      POSTGRES_DB: aca_db
    volumes:
      - aca_postgres_data:/var/lib/postgresql/data
    networks:
      - aca_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aca_user -d aca_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aca-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - aca_redis_data:/data
    networks:
      - aca_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aca-qdrant
    restart: unless-stopped
    volumes:
      - aca_qdrant_data:/qdrant/storage
    networks:
      - aca_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aca-backend
    restart: unless-stopped
    command: >
      sh -c "python create_users.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aca_user:aca_secret@postgres:5432/aca_db
      DATABASE_URL_SYNC: postgresql://aca_user:aca_secret@postgres:5432/aca_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      FRONTEND_URL: http://localhost
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8001:8000"
    volumes:
      - aca_backend_uploads:/app/uploads
    networks:
      - aca_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aca-celery
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aca_user:aca_secret@postgres:5432/aca_db
      DATABASE_URL_SYNC: postgresql://aca_user:aca_secret@postgres:5432/aca_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - aca_backend_uploads:/app/uploads
    networks:
      - aca_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    container_name: aca-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    depends_on:
      - backend
    ports:
      - "3001:3000"
    networks:
      - aca_net

volumes:
  aca_postgres_data:
  aca_redis_data:
  aca_qdrant_data:
  aca_backend_uploads:

networks:
  aca_net:
    driver: bridge
